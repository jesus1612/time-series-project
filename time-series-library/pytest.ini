[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    spark: marks tests that require PySpark
    benchmark: performance comparison (linear vs Spark vs reference); kept small for make test
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning




